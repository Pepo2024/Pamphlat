<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحميل تطبيق بامفلت</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .icon {
            width: 100px;
            height: 100px;
            background-color: #4f46e5;
            color: white;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 45px;
            margin: 0 auto 20px;
            box-shadow: 0 4px 6px rgba(79, 70, 229, 0.3);
        }
        h1
            margin: 0 0 10px;
            color: #1f2937;
            font-size: 26px;
        }
        p {
            color: #6b7280;
            margin-bottom: 30px;
            line-height: 1.6;
            font-size: 15px;
        }
        .download-btn {
            display: inline-block;
            background-color: #10b981;
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            transition: background-color 0.3s ease, transform 0.2s ease;
            box-shadow: 0 4px 6px rgba(16, 185, 129, 0.3);
        }
        .download-btn:hover {
            background-color: #059669;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- أيقونة تعبيرية للتطبيق -->
        <div class="icon">📱</div>

        <h1>تطبيق بامفلت</h1>
        <p>مرحباً بك! اضغط على الزر بالأسفل لتحميل التطبيق برابط مباشر وبكل سهولة.</p>

        <!-- زر التحميل مع خاصية download -->
        <a href="app-debug.apk" download class="download-btn">
            📥 تحميل التطبيق الآن
        </a>
    </div>

</body>
</html>
