<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bamflet Questions Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { text-align: center; color: #00e5ff; font-weight: 300; letter-spacing: 2px; }
        .question-card { background: #1e1e1e; border-radius: 15px; padding: 20px; margin-bottom: 20px; border-right: 5px solid #00e5ff; box-shadow: 0 4px 15px rgba(0,0,0,0.5); transition: 0.3s; }
        .question-card:hover { transform: translateY(-5px); }
        .file-name { font-size: 0.8em; color: #888; margin-bottom: 10px; display: block; }
        .question-text { font-size: 1.2em; color: #fff; line-height: 1.6; }
        .timestamp { font-size: 0.7em; color: #555; margin-top: 15px; text-align: left; }
    </style>
</head>
<body>
    <div class="container">
        <h1>الأسئلة الواردة - BAFILAT</h1>
        <div id="questions-list">
            <!-- الأسئلة ستظهر هنا -->
        </div>
    </div>

    <script>
        // ضع إعدادات الـ Firebase الخاصة بك هنا
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            databaseURL: "YOUR_DATABASE_URL",
            projectId: "YOUR_PROJECT_ID",
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('questions').on('value', (snapshot) => {
            const list = document.getElementById('questions-list');
            list.innerHTML = '';
            snapshot.forEach((childSnapshot) => {
                const data = childSnapshot.val();
                const card = `
                    <div class="question-card">
                        <span class="file-name">📂 ملف: ${data.fileName}</span>
                        <div class="question-text">${data.text}</div>
                        <div class="timestamp">${new Date(data.timestamp).toLocaleString('ar-EG')}</div>
                    </div>
                `;
                list.innerHTML = card + list.innerHTML; // الأحدث أولاً
            });
        });
    </script>
</body>
</html>
